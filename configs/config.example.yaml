# 示例配置文件 - 复制为config.yaml并根据您的设备修改
# 使用方法: cp configs/config.example.yaml configs/config.yaml

app_name: desk-safety
log_level: INFO

# 摄像头设备路径 - 根据您的设备修改
# 可以通过 v4l2-ctl --list-devices 查看可用设备
camera_device: /dev/video0
camera_width: 1280
camera_height: 480
camera_crop_left: true
input_size: 640
infer_interval_ms: 0

# 模型文件路径
model_path: ./models/detector.rknn

# COCO数据集类别名称
class_names:
  - person
  - bicycle
  - car
  - motorcycle
  - airplane
  - bus
  - train
  - truck
  - boat
  - traffic light
  - fire hydrant
  - stop sign
  - parking meter
  - bench
  - bird
  - cat
  - dog
  - horse
  - sheep
  - cow
  - elephant
  - bear
  - zebra
  - giraffe
  - backpack
  - umbrella
  - handbag
  - tie
  - suitcase
  - frisbee
  - skis
  - snowboard
  - sports ball
  - kite
  - baseball bat
  - baseball glove
  - skateboard
  - surfboard
  - tennis racket
  - bottle
  - wine glass
  - cup
  - fork
  - knife
  - spoon
  - bowl
  - banana
  - apple
  - sandwich
  - orange
  - broccoli
  - carrot
  - hot dog
  - pizza
  - donut
  - cake
  - chair
  - couch
  - potted plant
  - bed
  - dining table
  - toilet
  - tv
  - laptop
  - mouse
  - remote
  - keyboard
  - cell phone
  - microwave
  - oven
  - toaster
  - sink
  - refrigerator
  - book
  - clock
  - vase
  - scissors
  - teddy bear
  - hair drier
  - toothbrush

# 检测阈值
conf_threshold: 0.25
nms_threshold: 0.45

# 风险检测参数
risk_distance_px: 120
risk_hold_frames: 5
event_cooldown_sec: 8

# 危险区域 [x1, y1, x2, y2] (调整后的推理帧坐标)
danger_roi: [430, 260, 640, 640]
dense_count_threshold: 4
dense_iou_sum_threshold: 1.2

# 数据存储路径
snapshot_root: ./data/snapshots
db_path: ./data/events.db

# Web服务器配置
web_host: 0.0.0.0
web_port: 8080