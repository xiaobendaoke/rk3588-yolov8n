app_name: desk-safety
log_level: INFO

camera_device: /dev/video21
camera_width: 1280
camera_height: 480
camera_crop_left: true
input_size: 640
infer_interval_ms: 0

model_path: /opt/desk-safety/models/yolo11m.rknn
class_names:
  - person
  - bicycle
  - car
  - motorcycle
  - airplane
  - bus
  - train
  - truck
  - boat
  - traffic light
